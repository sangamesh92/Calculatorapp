<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Main content -->
    <main class="main-container">
<!-- WSA  icon -->
 <div class="wsaicon-container">
    <img src="Rashi.jpeg" alt="wsa-logo" class="Rashi-logo" style="height: 150px; width:150px;">

    </div>
    <!--title and calculator container -->
    <div class="sub-container">

        <!-- container -->
         <div class="calculator-container">
            <h1 class="header-container">Calculator-app</h1>
          </div>
            </div>
            <!-- Background-circle -->
             <Div class="Background-circle">

             </Div>
             <!-- input fields & output field -->
                <div class="input-container">
                    <input type="text" class="output-field"  id="dispay" readonly>
                    <input type="text" class="input-field"  placeholder="input-feild" id="input-feild" readonly>

                </div>
                <!-- Button row -->
                <section class="button-container">
                    <button class="btn">AC</button>
                    <button class="btn">=></button>
                    <button class="btn">%</button>
                    <button class="btn">^</button>
                </section>
                <!-- Buttons row 2 -->
                <section class="button-container">
                    <button class="btn">7</button>
                    <button class="btn">8</button>
                    <button class="btn">9</button>
                    <button class="btn">/</button>
                </section>
                <!-- Buttons row 3 -->
                <section class="button-container">
                    <button class="btn">4</button>
                    <button class="btn">5</button>
                    <button class="btn">6</button>
                    <button class="btn">*</button>  
                </section>
                <!-- Buttons row 4 -->
                <section class="button-container">
                    <button class="btn">1</button>
                    <button class="btn">2</button>
                    <button class="btn">3</button>
                    <button class="btn">-</button>
                </section>
                <!-- Buttons row 5 -->
                <section class="button-container">
                    <button class="btn">0</button>
                    <button class="btn">.</button>
                    <button class="btn">=</button>
                    <button class="btn">+</button>


    <footer class="footer-name">
        <p>&copy; 2026 My Calculator. All rights reserved.</p>
    </footer>
</main>

</body>
</html>
